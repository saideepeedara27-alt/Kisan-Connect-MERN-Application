name: kisan-connect

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      PORT: 5001
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      CLIENT_URL: ${CLIENT_URL}
      FARMER_SUBSCRIPTION_AMOUNT: ${FARMER_SUBSCRIPTION_AMOUNT:-199}
      CUSTOMER_PLATFORM_FEE: ${CUSTOMER_PLATFORM_FEE:-15}
      CURRENCY: ${CURRENCY:-INR}
      FAST_DELIVERY_PROVIDER: ${FAST_DELIVERY_PROVIDER:-Kisan Connect Delivery}
      FAST_DELIVERY_ETA_MINUTES: ${FAST_DELIVERY_ETA_MINUTES:-45}
      FAST_DELIVERY_PHONE: ${FAST_DELIVERY_PHONE:-+918880045045}
      SUPPORT_PHONE: ${SUPPORT_PHONE:-+918880012345}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@kisanconnect.local}
      SUPPORT_HOURS: ${SUPPORT_HOURS:-Every day, 8 AM - 8 PM}
    ports:
      - "127.0.0.1:${SERVER_PORT:-5001}:5001"
    volumes:
      - ./server/uploads:/app/server/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 20s
      timeout: 5s
      retries: 5

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy

  caddy:
    image: caddy:2.8-alpine
    profiles:
      - https
    restart: unless-stopped
    depends_on:
      - client
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
