name: CI and EC2 Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Validate Docker Compose
        env:
          CLIENT_URL: http://localhost
          MONGO_URI: mongodb+srv://example:example@example.mongodb.net/farm_connect
          JWT_SECRET: ci-compose-check
          GOOGLE_CLIENT_ID: ci-google-client-id
        run: docker compose config

      - name: Validate HTTPS Docker Compose
        env:
          APP_DOMAIN: kisanconnect.example.com
          CLIENT_PORT: 127.0.0.1:8080
          CLIENT_URL: https://kisanconnect.example.com
          MONGO_URI: mongodb+srv://example:example@example.mongodb.net/farm_connect
          JWT_SECRET: ci-compose-check
          GOOGLE_CLIENT_ID: ci-google-client-id
        run: docker compose --profile https config

  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e

            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            REPO_URL="https://github.com/saideepeedara27-alt/Kisan-Connect-MERN-Application.git"

            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/kisan-connect"
            fi

            command -v git >/dev/null 2>&1 || { echo "git is not installed on EC2"; exit 1; }
            command -v docker >/dev/null 2>&1 || { echo "docker is not installed on EC2"; exit 1; }

            if ! docker compose version >/dev/null 2>&1; then
              echo "docker compose plugin is not installed on EC2"
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            mkdir -p server/uploads

            APP_DOMAIN="${{ secrets.APP_DOMAIN }}"
            COMPOSE_ARGS=""
            if [ -n "$APP_DOMAIN" ]; then
              export APP_DOMAIN
              export CLIENT_PORT="127.0.0.1:8080"
              export CLIENT_URL="https://$APP_DOMAIN"
              COMPOSE_ARGS="--profile https"
              echo "HTTPS deploy enabled for $APP_DOMAIN"
            else
              export CLIENT_PORT="80"
              export CLIENT_URL="${{ secrets.CLIENT_URL }}"
              echo "HTTP deploy enabled. Add APP_DOMAIN secret to enable HTTPS."
            fi

            cat > .env <<'EOF'
            SERVER_PORT=5001
            VITE_API_URL=
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN || '7d' }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            ADDITIONAL_CLIENT_URLS=${{ secrets.ADDITIONAL_CLIENT_URLS }}
            FARMER_SUBSCRIPTION_AMOUNT=${{ secrets.FARMER_SUBSCRIPTION_AMOUNT || '199' }}
            CUSTOMER_PLATFORM_FEE=${{ secrets.CUSTOMER_PLATFORM_FEE || '15' }}
            CURRENCY=${{ secrets.CURRENCY || 'INR' }}
            FAST_DELIVERY_PROVIDER=${{ secrets.FAST_DELIVERY_PROVIDER || 'Kisan Connect Delivery' }}
            FAST_DELIVERY_ETA_MINUTES=${{ secrets.FAST_DELIVERY_ETA_MINUTES || '45' }}
            FAST_DELIVERY_PHONE=${{ secrets.FAST_DELIVERY_PHONE || '+918880045045' }}
            SUPPORT_PHONE=${{ secrets.SUPPORT_PHONE || '+918880012345' }}
            SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL || 'support@kisanconnect.local' }}
            SUPPORT_HOURS=${{ secrets.SUPPORT_HOURS || 'Every day, 8 AM - 8 PM' }}
            EOF
            {
              echo "CLIENT_PORT=$CLIENT_PORT"
              echo "CLIENT_URL=$CLIENT_URL"
              echo "APP_DOMAIN=$APP_DOMAIN"
            } >> .env

            docker compose $COMPOSE_ARGS down --remove-orphans || true
            docker rm -f kisan-connect-server kisan-connect-client kisan-connect-caddy kisan-connect-server-1 kisan-connect-client-1 kisan-connect-caddy-1 2>/dev/null || true

            SERVER_PORT_CONTAINERS="$(docker ps -q --filter "publish=5001")"
            if [ -n "$SERVER_PORT_CONTAINERS" ]; then
              echo "Removing old container using server port 5001: $SERVER_PORT_CONTAINERS"
              docker rm -f $SERVER_PORT_CONTAINERS
            fi

            CLIENT_PORT_CONTAINERS="$(docker ps -q --filter "publish=80")"
            if [ -n "$CLIENT_PORT_CONTAINERS" ]; then
              echo "Removing old container using client port 80: $CLIENT_PORT_CONTAINERS"
              docker rm -f $CLIENT_PORT_CONTAINERS
            fi

            HTTPS_PORT_CONTAINERS="$(docker ps -q --filter "publish=443")"
            if [ -n "$HTTPS_PORT_CONTAINERS" ]; then
              echo "Removing old container using HTTPS port 443: $HTTPS_PORT_CONTAINERS"
              docker rm -f $HTTPS_PORT_CONTAINERS
            fi

            docker compose $COMPOSE_ARGS up --build -d --remove-orphans
            docker compose $COMPOSE_ARGS ps
